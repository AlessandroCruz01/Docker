version: '3'
volumes:
  dados:
services:
  db:
    image: postgres:9.6
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      #* Volume para persistência dos dados do banco
      - dados:/var/lib/postgresql/data
      #* Scripts de inicialização do banco
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./scripts:/scripts
  frontend:
    image: nginx:1.13
    volumes:
      #* Volume para servir os arquivos estáticos do frontend
      - ./web:/usr/share/nginx/html
    ports:
      - '80:80'
  app:
    image: python:3.6
    volumes:
      - ./app:/app
    working_dir: /app
    command: bash ./app.sh
    ports:
      - '8080:8080'
