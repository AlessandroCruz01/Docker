<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-mail Sender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            transition: background-color 0.3s, color 0.3s;
        }

        #theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
        }

        .project-logo {
            width: 64px;
            height: 64px;
            background: var(--bs-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.75rem;
        }
    </style>
</head>

<body class="min-vh-100 d-flex flex-column align-items-center justify-content-center">

    <!-- Botão de modo dark -->
    <button id="theme-toggle" class="btn btn-outline-secondary btn-sm" title="Alternar modo dark">
        <i class="bi bi-moon-fill" id="theme-icon"></i>
    </button>

    <!-- Logo do projeto -->
    <div class="project-logo shadow mb-1">
        <i class="bi bi-envelope-at-fill text-white" style="font-size: 1.9rem;"></i>
    </div>
    <p class="text-muted small mb-4">E-mail Sender Service</p>

    <div class="card shadow-sm w-100" style="max-width: 520px;">
        <div class="card-header bg-primary text-white d-flex align-items-center gap-2">
            <i class="bi bi-envelope-fill fs-5"></i>
            <span class="fw-semibold fs-5">E-mail Sender</span>
        </div>
        <div class="card-body p-4">
            <form action="http://localhost/api" method="POST">
                <div class="mb-3">
                    <label for="assunto" class="form-label fw-medium">Assunto</label>
                    <input type="text" id="assunto" name="assunto" class="form-control"
                        placeholder="Digite o assunto...">
                </div>
                <div class="mb-4">
                    <label for="mensagem" class="form-label fw-medium">Mensagem</label>
                    <textarea id="mensagem" name="mensagem" class="form-control" rows="5"
                        placeholder="Digite sua mensagem..."></textarea>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-send-fill me-2"></i>Enviar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const html = document.documentElement;
        const toggleBtn = document.getElementById('theme-toggle');
        const icon = document.getElementById('theme-icon');

        const saved = localStorage.getItem('theme') || 'light';
        setTheme(saved);

        toggleBtn.addEventListener('click', () => {
            const next = html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            setTheme(next);
            localStorage.setItem('theme', next);
        });

        function setTheme(theme) {
            html.setAttribute('data-bs-theme', theme);
            icon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        }
    </script>
</body>

</html>
